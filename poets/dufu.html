    <h1>望岳（一）</h1>
    <p>岱宗夫如何？齐鲁青未了。</p>
    <p>造化钟神秀，阴阳割昏晓。</p>
        <p>荡胸生层云，决眦入归鸟。</p>
        <p>会当凌绝顶，一览众山小。</p>
    <br>
    <h1>登高</h1>
    <p>风急天高猿啸哀，渚清沙白鸟飞回。</p>
    <p>无边落木萧萧下，不尽长江滚滚来。</p>
        <p>万里悲秋常作客，百年多病独登台。</p>
        <p>艰难苦恨繁霜鬓，潦倒新停浊酒杯。</p>
