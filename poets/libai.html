<main class="poems-container">
    <article class="poem-card">
        <h1>静夜思</h1>
        <p>床前明月光，疑是地上霜。</p>
        <p>举头望明月，低头思故乡。</p>
    </article>
<article class="poem-card">
    <h1>望天门山</h1>
    <p>天门中断楚江开，碧水东流至此回。</p>
    <p>两岸青山相对出，孤帆一片日边来。</p>
</article>
